<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAP Compliance Hub</title>
    <!-- Tailwind CSS via CDN (zero build step for hobbyist dev) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="max-w-7xl mx-auto p-8">
        <h1 class="text-4xl font-bold mb-2">🛡️ OpenSCAP Compliance Hub</h1>
        <p class="text-emerald-400 mb-8">Multi-tenant dashboard — NIST Development phase ready</p>

        <!-- Multi-tenant Dashboard Structure -->
        <div class="bg-gray-900 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
                <span>📊 Multi-Tenant Compliance Hub</span>
            </h2>

            <!-- Organizations List (top level) -->
            <div class="mb-8">
                <h3 class="text-lg font-medium text-gray-400 mb-3">Organizations (Clients)</h3>
                <div id="org-list" class="grid grid-cols-3 gap-4">
                    <!-- Populated via HTMX later -->
                    <div class="bg-gray-800 rounded-xl p-6 cursor-pointer hover:bg-gray-700" hx-get="/api/orgs" hx-target="#org-list">
                        <p class="text-emerald-400 font-semibold">Acme Corp</p>
                        <p class="text-4xl font-bold">87%</p>
                        <p class="text-xs text-gray-500">12 hosts • 3 groups</p>
                    </div>
                    <!-- More org cards added by HTMX -->
                </div>
            </div>

            <!-- Host Groups & Hosts (will be loaded when org is selected) -->
            <div id="group-host-area" class="hidden">
                <!-- HTMX will swap this area with groups + hosts -->
            </div>

            <!-- ARF Upload (kept for later) -->
            <div class="mt-8 border-t border-gray-700 pt-8">
                <h3 class="text-xl font-semibold mb-4">Upload OpenSCAP ARF XML (coming next)</h3>
                <!-- (we'll re-add the form once schema is locked) -->
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAP Compliance Hub</title>
    <!-- Tailwind CSS via CDN (zero build step for hobbyist dev) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="max-w-7xl mx-auto p-8">
        <h1 class="text-4xl font-bold mb-2">🛡️ OpenSCAP Compliance Hub</h1>
        <p class="text-emerald-400 mb-8">Multi-tenant dashboard — NIST Development phase ready</p>

        <!-- Simple dashboard card -->
        <div class="bg-gray-900 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-semibold mb-6">Welcome, Admin!</h2>
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-gray-800 rounded-xl p-6">
                    <p class="text-sm text-gray-400">Organizations</p>
                    <p class="text-5xl font-bold text-emerald-400">0</p>
                </div>
                <div class="bg-gray-800 rounded-xl p-6">
                    <p class="text-sm text-gray-400">Hosts</p>
                    <p class="text-5xl font-bold text-blue-400">0</p>
                </div>
                <div class="bg-gray-800 rounded-xl p-6">
                    <p class="text-sm text-gray-400">Avg Compliance</p>
                    <p class="text-5xl font-bold text-amber-400">100%</p>
                </div>
            </div>
            <div class="mt-8 text-center text-gray-400 text-sm">
                HTMX + Askama demo — click the button below to test live updates
            </div>
            <button 
                hx-get="/api/hello"
                hx-target="#demo-area"
                class="mt-6 px-8 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-medium">
                Test HTMX (live reload)
            </button>
            <div id="demo-area" class="mt-4 text-emerald-400 font-mono"></div>
        </div>
    </div>
</body>
</html>

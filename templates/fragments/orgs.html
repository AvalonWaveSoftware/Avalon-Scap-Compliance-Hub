<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="org-grid">
    {% for org in orgs %}
    <div class="bg-gray-800 rounded-3xl p-6 hover:ring-2 hover:ring-emerald-500 transition cursor-pointer"
         hx-get="/api/dashboard/org/{{ org._id }}" 
         hx-target="#main-content">
        <div class="flex justify-between">
            <div>
                <p class="font-semibold text-xl">{{ org.name }}</p>
                <p class="text-emerald-400 text-sm">{{ org.host_count }} hosts • {{ org.group_count }} groups</p>
            </div>
            <div class="text-right">
                <p class="text-5xl font-bold text-emerald-400">{{ org.compliance }}%</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<div class="mb-6">
    <div class="flex justify-between items-center mb-3">
        <h3 class="text-lg font-medium text-gray-400">Organizations (Clients)</h3>
        <button 
            hx-get="/api/dashboard/new-org-form"
            hx-target="#new-org-modal"
            hx-on::after-request="document.getElementById('new-org-modal').classList.remove('hidden')"
            class="flex items-center gap-2 px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium">
            <span class="text-xl">+</span> New Organization
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="org-grid">
        {% for org in orgs %}
        <div class="bg-gray-800 rounded-3xl p-6 hover:ring-2 hover:ring-emerald-500 transition cursor-pointer"
             hx-get="/api/dashboard/org/{{ org._id }}" 
             hx-target="#main-content">
            <div class="flex justify-between">
                <div>
                    <p class="font-semibold text-xl">{{ org.name }}</p>
                    <p class="text-emerald-400 text-sm">{{ org.host_count }} hosts • {{ org.group_count }} groups</p>
                </div>
                <div class="text-right">
                    <p class="text-5xl font-bold text-emerald-400">{{ org.compliance }}%</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Modal container (always present when this fragment loads) -->
    <div id="new-org-modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50"></div>
</div>
